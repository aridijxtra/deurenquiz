<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>De 10 principes van coaching naar langdurige leefstijlverandering</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:ital,wght@0,300;0,400;0,600;0,700;1,400&display=swap" rel="stylesheet" />

  <style>
    :root {
      --color-oker:        #D4A017;
      --color-oker-light:  #E8C060;
      --color-oker-dark:   #A87C0C;
      --color-blauw:       #0D1F3C;
      --color-blauw-mid:   #163260;
      --color-blauw-light: #1E4080;
      --color-zwart:       #111111;
      --color-wit:         #F7F4EE;
      --color-grijs-licht: #EDE9E0;
      --color-grijs:       #C8C4B8;
      --font-body:         'Source Sans 3', 'Segoe UI', sans-serif;
      --shadow-sm:         0 2px 6px rgba(13,31,60,.15);
      --shadow-md:         0 6px 20px rgba(13,31,60,.28);
      --shadow-lg:         0 20px 56px rgba(13,31,60,.5);
      --radius-lg:         18px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; scroll-behavior: smooth; }

    body {
      font-family: var(--font-body);
      background-color: var(--color-blauw);
      color: var(--color-wit);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2.5rem 1.25rem 5rem;
      background-image:
        radial-gradient(ellipse at 15% 0%,   rgba(212,160,23,.16) 0%, transparent 52%),
        radial-gradient(ellipse at 85% 100%, rgba(30,64,128,.5)   0%, transparent 58%),
        radial-gradient(ellipse at 50% 50%,  rgba(22,50,96,.3)    0%, transparent 70%);
    }

    /* ── HEADER ─────────────────────────────────────── */
    .quiz-header {
      text-align: center;
      max-width: 780px;
      margin-bottom: 2.8rem;
      animation: fadeDown .65s ease both;
    }
    .quiz-header .eyebrow {
      display: inline-block;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--color-oker);
      margin-bottom: 0.65rem;
    }
    .quiz-header h1 {
      font-size: clamp(1.35rem, 3.2vw, 2rem);
      font-weight: 700;
      line-height: 1.3;
      color: var(--color-wit);
      margin-bottom: 0.55rem;
    }
    .quiz-header .hint {
      font-size: 0.9rem;
      font-weight: 300;
      color: var(--color-grijs);
    }
    .quiz-header::after {
      content: '';
      display: block;
      width: 56px;
      height: 4px;
      background: var(--color-oker);
      border-radius: 99px;
      margin: 1.1rem auto 0;
    }

    /* ── GRID ────────────────────────────────────────── */
    .doors-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 1.2rem;
      width: 100%;
      max-width: 1100px;
    }
    @media (max-width: 900px) { .doors-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 500px) { .doors-grid { grid-template-columns: 1fr; } }

    /* ── DOOR SCENE ──────────────────────────────────── */
    .door-scene {
      perspective: 1400px;
      height: 340px;
      animation: fadeUp .55s ease both;
    }
    .door-scene:nth-child(1)  { animation-delay: .05s; }
    .door-scene:nth-child(2)  { animation-delay: .10s; }
    .door-scene:nth-child(3)  { animation-delay: .15s; }
    .door-scene:nth-child(4)  { animation-delay: .20s; }
    .door-scene:nth-child(5)  { animation-delay: .25s; }
    .door-scene:nth-child(6)  { animation-delay: .30s; }
    .door-scene:nth-child(7)  { animation-delay: .35s; }
    .door-scene:nth-child(8)  { animation-delay: .40s; }
    .door-scene:nth-child(9)  { animation-delay: .45s; }
    .door-scene:nth-child(10) { animation-delay: .50s; }

    .door-wrapper {
      position: relative;
      width: 100%;
      height: 100%;
      transform-style: preserve-3d;
    }

    /* ── DOOR FRONT ──────────────────────────────────── */
    .door-front {
      position: absolute;
      inset: 0;
      background: linear-gradient(165deg, var(--color-oker-light) 0%, var(--color-oker) 45%, var(--color-oker-dark) 100%);
      border-radius: var(--radius-lg);
      border: 3px solid rgba(255,255,255,.13);
      box-shadow: var(--shadow-md), inset 0 1px 0 rgba(255,255,255,.3);
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.7rem;
      padding: 1.2rem 1rem;
      text-align: center;
      backface-visibility: hidden;
      transform-origin: left center;
      transition: transform .85s cubic-bezier(.4,0,.2,1), box-shadow .25s ease;
      z-index: 2;
      user-select: none;
    }
    .door-front::before,
    .door-front::after {
      content: '';
      position: absolute;
      border: 2px solid rgba(168,124,12,.4);
      border-radius: 6px;
      pointer-events: none;
    }
    .door-front::before { inset: 12px 12px calc(50% + 8px) 12px; }
    .door-front::after  { inset: calc(50% + 8px) 12px 12px 12px; }

    .door-knob {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      width: 11px;
      height: 11px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #fffbe0, var(--color-blauw-mid));
      box-shadow: 0 2px 5px rgba(0,0,0,.45);
    }
    .door-number {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--color-blauw);
      color: var(--color-oker);
      font-size: 1rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: var(--shadow-sm);
      flex-shrink: 0;
    }
    .door-label {
      font-size: 0.82rem;
      font-weight: 700;
      color: var(--color-zwart);
      line-height: 1.35;
      max-width: 18ch;
    }
    .door-cta {
      font-size: 0.66rem;
      font-weight: 600;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--color-blauw-mid);
      opacity: .7;
    }
    .door-front:hover:not(.is-open) {
      box-shadow: var(--shadow-lg), 0 0 0 3px var(--color-oker-light);
    }
    .door-front.is-open {
      transform: rotateY(-118deg);
      box-shadow: -10px 10px 32px rgba(0,0,0,.45);
      cursor: default;
    }

    /* ── DOOR BACK (compact preview) ────────────────── */
    .door-back {
      position: absolute;
      inset: 0;
      background: var(--color-wit);
      color: var(--color-zwart);
      border-radius: var(--radius-lg);
      border: 3px solid rgba(212,160,23,.35);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      opacity: 0;
      pointer-events: none;
      transition: opacity .3s ease .5s;
      z-index: 1;
      cursor: pointer;
    }
    .door-back.is-visible {
      opacity: 1;
      pointer-events: auto;
    }
    .door-back:hover .expand-hint {
      background: var(--color-oker);
      color: var(--color-zwart);
    }

    .door-back__illus {
      width: 100%;
      height: 148px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background: var(--color-grijs-licht);
    }
    .door-back__illus svg { width: 100%; height: 100%; }

    .door-back__body {
      padding: 0.65rem 0.85rem 0.5rem;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 0.2rem;
      overflow: hidden;
    }
    .door-back__num {
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: .13em;
      text-transform: uppercase;
      color: var(--color-oker-dark);
    }
    .door-back__title {
      font-size: 0.84rem;
      font-weight: 700;
      color: var(--color-blauw);
      line-height: 1.25;
    }

    .expand-hint {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.35rem;
      padding: 0.55rem;
      background: var(--color-blauw);
      color: var(--color-oker);
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      transition: background .2s, color .2s;
      flex-shrink: 0;
    }

    .door-close {
      position: absolute;
      top: 7px;
      right: 7px;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: var(--color-blauw);
      color: var(--color-oker);
      font-size: 0.75rem;
      font-weight: 700;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: var(--shadow-sm);
      transition: background .2s, transform .15s;
      z-index: 10;
    }
    .door-close:hover {
      background: var(--color-oker);
      color: var(--color-blauw);
      transform: scale(1.15);
    }

    /* ── MODAL OVERLAY ───────────────────────────────── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(13,31,60,.84);
      backdrop-filter: blur(7px);
      -webkit-backdrop-filter: blur(7px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      z-index: 1000;
      opacity: 0;
      pointer-events: none;
      transition: opacity .3s ease;
      cursor: pointer;
    }
    .modal-overlay.is-open {
      opacity: 1;
      pointer-events: auto;
    }

    .modal-card {
      position: relative;
      background: var(--color-wit);
      color: var(--color-zwart);
      border-radius: 24px;
      overflow: hidden;
      width: 100%;
      max-width: 600px;
      max-height: 90vh;
      display: flex;
      flex-direction: column;
      box-shadow: var(--shadow-lg);
      transform: scale(.93) translateY(20px);
      transition: transform .38s cubic-bezier(.34,1.3,.64,1);
      cursor: default;
    }
    .modal-overlay.is-open .modal-card {
      transform: scale(1) translateY(0);
    }

    .modal-illus {
      width: 100%;
      height: 200px;
      flex-shrink: 0;
      overflow: hidden;
      background: var(--color-grijs-licht);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .modal-illus svg { width: 100%; height: 100%; }

    .modal-body {
      padding: 1.8rem 2rem 2.2rem;
      overflow-y: auto;
      flex: 1;
    }
    .modal-num {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: .16em;
      text-transform: uppercase;
      color: var(--color-oker-dark);
      margin-bottom: 0.3rem;
    }
    .modal-body h2 {
      font-size: 1.45rem;
      font-weight: 700;
      color: var(--color-blauw);
      line-height: 1.2;
      margin-bottom: 1rem;
    }
    .modal-body p {
      font-size: 0.97rem;
      line-height: 1.72;
      color: #2a2520;
      margin-bottom: 0.9rem;
    }
    .modal-body p:last-of-type { margin-bottom: 0; }

    .modal-takeaway {
      margin-top: 1.3rem;
      padding: 0.9rem 1.15rem;
      background: rgba(212,160,23,.12);
      border-left: 4px solid var(--color-oker);
      border-radius: 0 10px 10px 0;
      font-size: 0.92rem;
      font-weight: 600;
      color: var(--color-blauw);
      line-height: 1.5;
    }

    .modal-close-btn {
      position: absolute;
      top: 1rem;
      right: 1rem;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--color-blauw);
      color: var(--color-oker);
      border: none;
      font-size: 1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: var(--shadow-md);
      transition: background .2s, transform .2s;
      z-index: 10;
    }
    .modal-close-btn:hover {
      background: var(--color-oker);
      color: var(--color-blauw);
      transform: scale(1.1) rotate(90deg);
    }

    /* ── RESET ───────────────────────────────────────── */
    .reset-wrap {
      margin-top: 2rem;
      text-align: center;
      animation: fadeUp .6s .6s ease both;
    }
    .btn-reset {
      font-family: var(--font-body);
      font-size: 0.88rem;
      font-weight: 700;
      letter-spacing: .07em;
      text-transform: uppercase;
      padding: .65em 2em;
      border: 2px solid var(--color-oker);
      background: transparent;
      color: var(--color-oker);
      border-radius: 99px;
      cursor: pointer;
      transition: background .2s, color .2s, transform .15s;
    }
    .btn-reset:hover {
      background: var(--color-oker);
      color: var(--color-zwart);
      transform: translateY(-2px);
    }

    /* ── ANIMATIONS ─────────────────────────────────── */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(22px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <header class="quiz-header">
    <span class="eyebrow">Leefstijlcoaching · Verdieping</span>
    <h1>De 10 principes van coaching naar langdurige leefstijlverandering</h1>
    <p class="hint">Klik op een deur om te openen — klik daarna op de kaart voor de volledige uitleg.</p>
  </header>

  <div class="doors-grid" id="doorsGrid"></div>

  <div class="reset-wrap">
    <button class="btn-reset" onclick="resetAll()">↺ Alle deuren sluiten</button>
  </div>

  <!-- MODAL -->
  <div class="modal-overlay" id="modalOverlay" onclick="handleOverlayClick(event)">
    <div class="modal-card" id="modalCard">
      <button class="modal-close-btn" onclick="closeModal()" title="Sluiten">✕</button>
      <div class="modal-illus" id="modalIllus"></div>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>

  <script>
  /* ─────────────────────────────────────────────────
     PRINCIPLE DATA
  ───────────────────────────────────────────────── */
  const principles = [
    {
      num: 1,
      label: "Motivatie staat centraal",
      svgBg: "#EDE9E0",
      svg: `<circle cx="100" cy="78" r="48" fill="rgba(212,160,23,.10)"/>
        <path d="M100 128 C 62 128 42 104 42 84 C 42 64 62 58 72 44 C 77 68 87 70 87 54 C 97 70 102 60 102 44 C 112 64 122 67 127 50 C 137 70 158 76 158 96 C 158 116 138 128 100 128 Z" fill="#D4A017" opacity=".85"/>
        <path d="M100 120 C 76 120 63 107 63 94 C 63 81 76 74 81 64 C 84 77 91 79 91 69 C 98 80 101 74 101 64 C 109 77 116 80 119 70 C 125 82 139 87 139 100 C 139 114 123 120 100 120 Z" fill="#E8C060"/>
        <path d="M100 110 C 83 110 76 101 76 94 C 76 87 83 83 87 76 C 89 84 94 85 94 79 C 99 86 103 83 103 77 C 107 85 115 87 115 95 C 115 104 108 110 100 110 Z" fill="#fff" opacity=".45"/>
        <text x="100" y="147" text-anchor="middle" font-family="'Source Sans 3',sans-serif" font-size="10" fill="#5a5040">Intrinsieke motivatie</text>`,
      intro: "Duurzame verandering begint van binnenuit. Externe druk — van een arts, partner of werkgever — kan gedrag tijdelijk in gang zetten, maar houdt zelden stand. Alleen wanneer de cliënt zelf wil veranderen en eigen redenen heeft, ontstaat de energie om vol te houden.",
      detail: "De coach werkt voortdurend aan het verhelderen en versterken van die intrinsieke motivatie. Technieken zoals motiverende gespreksvoering (MI) helpen de cliënt zijn eigen 'waarom' te articuleren. Vragen als 'Wat zou er verbeteren in je leven?' of 'Wat is jou het meest waard?' brengen de diepere drijfveren boven tafel. Zodra de cliënt dit zelf hardop uitspreekt, versterkt het de commitment.",
      takeaway: "Vraag jezelf als coach altijd af: werkt de cliënt voor mij, of voor zichzelf?"
    },
    {
      num: 2,
      label: "Ambivalentie is normaal",
      svgBg: "#EDE9E0",
      svg: `<path d="M30 75 L88 75" stroke="#0D1F3C" stroke-width="5" stroke-linecap="round"/>
        <polygon points="88,67 105,75 88,83" fill="#0D1F3C"/>
        <path d="M170 75 L112 75" stroke="#A87C0C" stroke-width="5" stroke-linecap="round"/>
        <polygon points="112,67 95,75 112,83" fill="#A87C0C"/>
        <circle cx="100" cy="75" r="14" fill="#F7F4EE" stroke="#C8C4B8" stroke-width="2"/>
        <text x="100" y="80" text-anchor="middle" font-family="'Source Sans 3',sans-serif" font-size="12" font-weight="700" fill="#5a5040">?</text>
        <text x="52"  y="58" text-anchor="middle" font-family="'Source Sans 3',sans-serif" font-size="9" fill="#0D1F3C" font-weight="600">Veranderen</text>
        <text x="150" y="58" text-anchor="middle" font-family="'Source Sans 3',sans-serif" font-size="9" fill="#A87C0C" font-weight="600">Blijven</text>
        <text x="100" y="118" text-anchor="middle" font-family="'Source Sans 3',sans-serif" font-size="9" fill="#5a5040">Beide gevoelens zijn geldig</text>`,
      intro: "Vrijwel iedereen die aan verandering begint, ervaart ambivalentie: een deel wil veranderen, een ander deel wil alles bij het oude laten. Dit is geen zwakte of gebrek aan wilskracht — het is een universeel menselijk fenomeen dat bij elk betekenisvol veranderingsproces hoort.",
      detail: "De coach die ambivalentie negeert of bestrijdt, maakt het moeilijker. Wie het erkent en bespreekbaar maakt, ontlast de cliënt en versterkt de werkrelatie. Balansoverzichten — 'Wat zijn redenen om te veranderen, en wat zijn redenen om het niet te doen?' — helpen de cliënt zelf de balans zien kantelen. Wanneer de voordelen van verandering duidelijk zwaarder wegen, groeit de bereidheid vanzelf.",
      takeaway: "Ambivalentie benoemen is geen obstakel — het is het begin van echte beweging."
    },
    {
      num: 3,
      label: "Kleine stappen, groot effect",
      svgBg: "#EDE9E0",
      svg: `<rect x="20"  y="122" width="28" height="10" rx="3" fill="#A87C0C"/>
        <rect x="48"  y="110" width="28" height="22" rx="3" fill="#D4A017"/>
        <rect x="76"  y="94"  width="28" height="38" rx="3" fill="#D4A017"/>
        <rect x="104" y="74"  width="28" height="58" rx="3" fill="#1E4080"/>
        <rect x="132" y="50"  width="28" height="82" rx="3" fill="#0D1F3C"/>
        <text x="146" y="46" text-anchor="middle" font-family="'Source Sans 3',sans-serif" font-size="16">⭐</text>
        <text x="100" y="146" text-anchor="middle" font-family="'Source Sans 3',sans-serif" font-size="9" fill="#5a5040">Stap voor stap omhoog</text>`,
      intro: "Ambitieuze doelen klinken motiverend, maar leiden in de praktijk vaak tot overweldiging en afhaken. Kleine, concrete gedragsdoelen — 'morgen loop ik 10 minuten na het avondeten' in plaats van 'ik ga sporten' — zijn haalbaar en geven direct succeservaringen.",
      detail: "Elk klein succes activeert het beloningssysteem in de hersenen en vergroot het zelfvertrouwen voor de volgende stap. De coach helpt doelen zo concreet en klein mogelijk te formuleren (SMART), zodat mislukken moeilijk is. Naarmate de cliënt groeit, worden stappen geleidelijk groter — zonder dat het ooit overweldigend voelt. Dit is het principe van graduele blootstelling en progressieve overbelasting, toegepast op gedragsverandering.",
      takeaway: "Een gewoonte die te makkelijk voelt is beter dan een doel dat te groot voelt."
    },
    {
      num: 4,
      label: "Zelfeffectiviteit versterken",
      svgBg: "#EDE9E0",
      svg: `<ellipse cx="100" cy="92" rx="24" ry="32" fill="#1E4080" opacity=".2"/>
        <path d="M70 102 Q70 67 100 60 Q130 67 130 102 Q128 120 100 124 Q72 120 70 102Z" fill="#1E4080" opacity=".75"/>
        <path d="M80 90 Q100 62 120 90" fill="none" stroke="#D4A017" stroke-width="5" stroke-linecap="round"/>
        <circle cx="100" cy="66" r="15" fill="#D4A017" opacity=".95"/>
        <text x="100" y="71" text-anchor="middle" font-family="'Source Sans 3',sans-serif" font-size="13" font-weight="700" fill="#111">✓</text>
        <text x="100" y="144" text-anchor="middle" font-family="'Source Sans 3',sans-serif" font-size="9" fill="#5a5040">Ik kan het — en ik doe het</text>`,
      intro: "Zelfeffectiviteit is de overtuiging dat je in staat bent een bepaalde taak succesvol uit te voeren. Albert Bandura toonde aan dat deze overtuiging een van de krachtigste voorspellers is van volhoudgedrag — sterker dan kennis of intentie alleen.",
      detail: "De coach vergroot zelfeffectiviteit op vier manieren: door eerdere successen te benoemen en te verankeren ('je hebt dit al eerder gedaan'), door rolmodellen aan te bieden ('anderen in jouw situatie kunnen het ook'), door aanmoediging te geven ('ik zie dat je dit kunt'), en door fysiologische drempels te verlagen zodat de cliënt ervaart hoe gedrag voelt. Elke positieve ervaring voegt een laag van vertrouwen toe.",
      takeaway: "Zelfvertrouwen groeit door doen, niet door nadenken."
    },
    {
      num: 5,
      label: "Terugval als leermomment",
      svgBg: "#EDE9E0",
      svg: `<path d="M100 132 C 56 132 32 112 32 90 C 32 68 56 57 80 64 C 104 71 114 90 100 100 C 86 110 66 102 69 90 C 72 78 86 74 96 80" fill="none" stroke="#0D1F3C" stroke-width="4" stroke-linecap="round"/>
        <path d="M96 80 L100 58" stroke="#D4A017" stroke-width="4" stroke-linecap="round"/>
        <polygon points="100,50 93,67 107,67" fill="#D4A017"/>
        <circle cx="100" cy="46" r="11" fill="#D4A017" opacity=".9"/>
        <text x="100" y="50.5" text-anchor="middle" font-family="'Source Sans 3',sans-serif" font-size="11" font-weight="700" fill="#111">↑</text>
        <text x="100" y="147" text-anchor="middle" font-family="'Source Sans 3',sans-serif" font-size="9" fill="#5a5040">Vallen en opstaan leidt omhoog</text>`,

  /* ─────────────────────────────────────────────────
     BUILD GRID
  ───────────────────────────────────────────────── */
  const grid = document.getElementById('doorsGrid');

  principles.forEach(p => {
    const id = String(p.num);
    const scene = document.createElement('div');
    scene.className = 'door-scene';
    scene.id = 'scene-' + id;
    scene.innerHTML = `
      <div class="door-wrapper">
        <div class="door-front" id="door-${id}" onclick="toggleDoor('${id}')">
          <div class="door-number">${p.num}</div>
          <div class="door-label">${p.label}</div>
          <div class="door-cta">↩ Open</div>
          <div class="door-knob"></div>
        </div>
        <div class="door-back" id="back-${id}" onclick="openModal('${id}')">
          <button class="door-close" onclick="event.stopPropagation(); closeDoor('${id}')" title="Sluiten">✕</button>
          <div class="door-back__illus">
            <svg viewBox="0 0 200 150" xmlns="http://www.w3.org/2000/svg">
              <rect width="200" height="150" fill="${p.svgBg}"/>
              ${p.svg}
            </svg>
          </div>
          <div class="door-back__body">
            <div class="door-back__num">Principe ${p.num}</div>
            <div class="door-back__title">${p.label}</div>
          </div>
          <div class="expand-hint"><span>Lees meer</span><span style="margin-left:.3rem">→</span></div>
        </div>
      </div>`;
    grid.appendChild(scene);
  });

  /* ─────────────────────────────────────────────────
     DOOR LOGIC
  ───────────────────────────────────────────────── */
  function toggleDoor(id) {
    const front = document.getElementById('door-' + id);
    front.classList.contains('is-open') ? closeDoor(id) : openDoor(id);
  }

  function openDoor(id) {
    document.getElementById('door-' + id).classList.add('is-open');
    setTimeout(() => document.getElementById('back-' + id).classList.add('is-visible'), 420);
  }

  function closeDoor(id) {
    document.getElementById('back-' + id).classList.remove('is-visible');
    setTimeout(() => document.getElementById('door-' + id).classList.remove('is-open'), 280);
  }

  function resetAll() {
    for (let i = 1; i <= 10; i++) closeDoor(String(i));
    closeModal();
  }

  /* ─────────────────────────────────────────────────
     MODAL LOGIC
  ───────────────────────────────────────────────── */
  function openModal(id) {
    const p = principles[parseInt(id) - 1];
    document.getElementById('modalIllus').innerHTML = `
      <svg viewBox="0 0 200 150" xmlns="http://www.w3.org/2000/svg">
        <rect width="200" height="150" fill="${p.svgBg}"/>
        ${p.svg}
      </svg>`;
    document.getElementById('modalBody').innerHTML = `
      <div class="modal-num">Principe ${p.num}</div>
      <h2>${p.label}</h2>
      <p>${p.intro}</p>
      <p>${p.detail}</p>
      <div class="modal-takeaway">${p.takeaway}</div>`;
    document.getElementById('modalOverlay').classList.add('is-open');
    document.body.style.overflow = 'hidden';
  }

  function closeModal() {
    document.getElementById('modalOverlay').classList.remove('is-open');
    document.body.style.overflow = '';
  }

  function handleOverlayClick(e) {
    if (e.target === document.getElementById('modalOverlay')) closeModal();
  }

  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
  </script>
